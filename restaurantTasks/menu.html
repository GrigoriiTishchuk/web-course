<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restaurant Menu | StudentEats</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="main-header">
        <div class="container">
            <h1 class="logo">Student<span>DiscountFOOD</span></h1>
            <nav><a href="index.html" class="btn-sm outline">Back to List</a></nav>
        </div>
    </header>

    <main class="container">
        <section class="menu-detail-header">
            <h2 id="restaurant-name">Metropolia Arabiakeskus</h2>
            <p id="restaurant-address">Hämeentie 135, 00560 Helsinki</p>
            <div class="view-toggle">
                <button class="btn-sm active">Daily</button>
                <button class="btn-sm outline">Weekly</button>
            </div>
        </section>

        <section class="menu-content">
            <table class="menu-table">
                <thead>
                    <tr>
                        <th>Course</th>
                        <th>Dietary</th>
                        <th>Price</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td><strong>Creamy Salmon Soup</strong></td>
                        <td><span class="diet-tag">L</span> <span class="diet-tag">G</span></td>
                        <td>2,95 €</td>
                    </tr>
                    <tr>
                        <td><strong>Soy Curls with Curry</strong></td>
                        <td><span class="diet-tag">Veg</span> <span class="diet-tag">M</span></td>
                        <td>2,95 €</td>
                    </tr>
                </tbody>
            </table>
        </section>
    </main>
</body>
</html>
