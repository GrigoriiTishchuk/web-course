<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | StudentEats</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="auth-page">
    <div class="auth-container">
        <header class="auth-header">
            <h1 class="logo">Student<span>DiscountFOOD</span></h1>
            <p>Create your account to save favorites.</p>
        </header>
        
        <form id="register-form" class="card">
            <div class="form-group">
                <label for="reg-username">Username</label>
                <input type="text" id="reg-username" required>
            </div>
            <div class="form-group">
                <label for="reg-email">Email</label>
                <input type="email" id="reg-email" required>
            </div>
            <div class="form-group">
                <label for="reg-password">Password</label>
                <input type="password" id="reg-password" required>
            </div>
            <div class="form-group">
                <label for="profile-pic">Profile Picture</label>
                <input type="file" id="profile-pic" accept="image/*">
            </div>
            <button type="submit" class="btn-primary full-width">Create Account</button>
            <p class="auth-footer">Already have an account? <a href="login.html">Login here</a></p>
        </form>
    </div>
</body>
</html>
