<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link rel="stylesheet" href="t1.css">
  <script src="t1.js" defer></script>
</head>

<body>
  <h1>Todo List</h1>
  <ul id="todo-list">
    <!-- add todo list conent here -->
  </ul>
  <dialog id="add-modal">
    <h2>Add Todo Item</h2>
    <form id="add-form">
      <input type="text"  id="todo-input" placeholder="Add todo item here" />
      <div class="form-buttons">
        <button type="submit" id="save-btn">Save</button>
        <button type="button" id="cancel-btn">Cancel</button>
      </div>
    </form>
  </dialog>
  <button class="add-btn" id="add-btn">Add Todo Item</button>
</body>

</html>
