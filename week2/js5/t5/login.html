<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | StudentEats</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="auth-page">
    <div class="auth-container">
        <header class="auth-header">
            <h1 class="logo">Student<span>DiscountFOOD</span></h1>
            <p>Welcome back! Please login.</p>
        </header>
        
        <form id="login-form" class="card">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required>
            </div>
            <button type="submit" class="btn-primary full-width">Sign In</button>
            <p class="auth-footer">Don't have an account? <a href="register.html">Register here</a></p>
        </form>
        <a href="index.html" class="back-link">← Back to Restaurants</a>
    </div>
</body>
</html>
